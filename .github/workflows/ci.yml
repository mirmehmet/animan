name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    # WPF (net10.0-windows) only builds on Windows.
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore AniTrack.slnx

      - name: Build
        run: dotnet build AniTrack.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test AniTrack.slnx --configuration Release --no-build --verbosity normal
